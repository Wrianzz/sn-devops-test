apiVersion: apps/v1
kind: Deployment
metadata:
  name: books-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: books
  template:
    metadata:
      labels:
        app: books
    spec:
      containers:
      - name: books
        image: wrianzz/bookslib-books-service:latest
        imagePullPolicy: Always
        env:
        - name: PG_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: PG_PASS
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: ConnectionStrings__DefaultConnection
          value: "Host=postgres;Database=books_db;Username=$(PG_USER);Password=$(PG_PASS)"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: books-service
spec:
  type: NodePort
  selector:
    app: books
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30082
