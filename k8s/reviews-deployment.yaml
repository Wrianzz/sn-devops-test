apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviews-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reviews
  template:
    metadata:
      labels:
        app: reviews
    spec:
      containers:
      - name: reviews
        image: wrianzz/bookslib-reviews-service:latest
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          value: "postgres"
        - name: DB_NAME
          value: "reviews_db"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: reviews-service
spec:
  type: NodePort
  selector:
    app: reviews
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30083
