apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookslib-app
  namespace: default
  labels:
    app: bookslib
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bookslib
  template:
    metadata:
      labels:
        app: bookslib
    spec:
      containers:
      - name: bookslib
        image: wrianzz/bookslib:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
